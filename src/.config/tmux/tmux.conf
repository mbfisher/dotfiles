# True color + 256 color terminal
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,ghostty:RGB"

# Mouse + sane scrollback
set -g mouse on
set -g history-limit 50000

# Start window/pane indexes at 1 (tilish uses 1..9 for workspaces)
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster key response
set -sg escape-time 10

# Forward modifier-key combos (Cmd+/, Cmd+[, etc.) through tmux to inner panes.
# Ghostty encodes these via the CSI-u extended-keys protocol; tmux must opt in
# and declare the terminal supports them, otherwise nvim mappings like `<D-/>`
# (comment toggle) are silently dropped. `always` forwards to nvim even when
# nvim hasn't sent the explicit enable handshake to tmux.
set -g extended-keys always
set -as terminal-features '*:extkeys'

# Advertise modern terminal features to programs running inside tmux. Without
# `sync`, nvim 0.12 falls back to per-cell writes (no DECSET 2026 frame
# buffering), which made Snacks' floating picker hang during live grep —
# hundreds of escape sequences per keystroke choke the tmux→Ghostty pipeline.
# RGB replaces the terminal-overrides hack above; hyperlinks enables OSC 8 in
# things like :Man and gx; focus + focus-events on lets nvim receive
# FocusGained/Lost so autoread, gitsigns refresh, etc. fire on pane switch.
set -as terminal-features '*:sync:RGB:hyperlinks:focus'
set -g focus-events on

# Let DCS sequences pass through tmux unchanged. Without this, Ghostty's
# XTVERSION response (`\eP>|Ghostty 1.3.1\e\\`) — sent in reply to nvim's
# `CSI > q` capability query — has its DCS wrapper stripped by tmux and the
# raw "Ghostty 1.3.1" payload gets typed into whatever's focused, including
# the Snacks picker input. Also required for kitty graphics passthrough in
# image previewers.
set -g allow-passthrough on

# Vi-style copy mode
setw -g mode-keys vi

# Forward a useful title to the outer terminal (Ghostty tab) via OSC.
# `#{b:pane_current_path}` = basename of the focused pane's cwd; `#{pane_title}`
# = the title programs like claude/nvim set via xterm OSC sequences (where
# zellij gets "current topic" from too). Falls back to just the cwd if the
# program hasn't set a title.
set -g set-titles on
set -g set-titles-string '#{b:pane_current_path}#{?#{!=:#{pane_title},#H}, · #{pane_title},}'

# Right-pane toggle: swap whatever is in `main.2` (the right pane of the main
# window) with the single pane in a hidden window called `holder`. Set up the
# layout once with: claude in main.1, nvim in main.2, shell in holder.1.
# Then `prefix + Tab` cycles which of {nvim, shell} occupies the right column.
bind-key Tab run-shell "tmux swap-pane -s holder.1 -t main.2"

# Cycle claude (left) pane width: 33% → 50% → 66% → 33%. Replaces zellij's
# named swap-layouts. Width state is stashed in a global tmux option so it
# survives between invocations and across sessions.
bind-key w run-shell '\
  cur=$(tmux show-option -gv @claude-width 2>/dev/null || echo 50); \
  case "$cur" in 33) next=50 ;; 50) next=66 ;; 66) next=33 ;; *) next=50 ;; esac; \
  width=$(( $(tmux display -p "#{window_width}") * next / 100 )); \
  tmux resize-pane -t main.1 -x "$width" && \
  tmux set-option -g @claude-width "$next"'

# Plugins (managed by tpm). Install: prefix + I. Update: prefix + U.
# Install plugins under ~/.tmux/plugins/ so they don't land inside this
# dotfiles repo via the ~/.config/tmux symlink (tpm's XDG default would).
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
#
# tmux-tilish: i3-style tiling. Manages panes via a chosen *layout*
# (main-vertical, tiled, etc.) rather than per-split orientation. A hook
# reflows the layout after every split, so the built-in tmux split keys
# (C-b % / C-b ") work too — the orientation is just ignored.
#   Alt + Enter             new pane (bottom-right; layout reflows)
#   Alt + h/j/k/l           focus pane in direction
#   Alt + H/J/K/L           move pane in direction (swap with neighbor)
#   Alt + 1..9              switch to workspace; Alt + Shift + 1..9 moves a pane
#   Alt + s / S             main-horizontal / even-vertical layout
#   Alt + v / V             main-vertical / even-horizontal layout
#   Alt + t / z             tiled / zoom (fullscreen) layout
#   Alt + r                 refresh layout
#   Alt + n                 rename workspace
#   Alt + Shift + q         close pane
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'jabirali/tmux-tilish'

# Initialize tpm. Must stay at the bottom of this file.
run '~/.tmux/plugins/tpm/tpm'
