[post-create]
copy_mprocs = '''
  if [ -f "{{ repo_path }}/mprocs.yaml" ]; then
    echo "📋 Copying mprocs.yaml to worktree"
    cp "{{ repo_path }}/mprocs.yaml" "{{ worktree_path }}/mprocs.yaml"
    echo "  ✓ mprocs.yaml copied"
  fi
'''

[projects]

[projects."github.com/incident-io/core"]
approved-commands = [
    """
  echo "📋 Copying untracked .claude files to worktree"
  cd "{{ repo_path }}"

  # Known .claude locations: root, server, apps/*
  for claude_dir in .claude server/.claude apps/*/.claude; do
    if [ -d "{{ repo_path }}/$claude_dir" ]; then
      # List all non-tracked files in this .claude directory, including gitignored
      # ones like settings.local.json (which is the whole point of this hook)
      git ls-files --others "$claude_dir" | while read -r file; do
        if [ -f "{{ repo_path }}/$file" ]; then
          target_file="{{ worktree_path }}/$file"
          mkdir -p "$(dirname "$target_file")"
          cp "{{ repo_path }}/$file" "$target_file"
          echo "  ✓ Copied $file (untracked)"
        fi
      done
    fi
  done
""",
    """
  echo "🔗 Setting up node_modules symlinks..."

  # Known node_modules locations: root, packages/*, apps/*
  for node_modules_path in node_modules packages/*/node_modules apps/*/node_modules; do
    # Expand the glob pattern
    for source_dir in {{ repo_path }}/$node_modules_path; do
      # Skip if glob didn't match anything
      if [ ! -d "$source_dir" ]; then
        continue
      fi

      # Get relative path from repo root
      relative_path="${source_dir#{{ repo_path }}/}"
      target_link="{{ worktree_path }}/$relative_path"

      # Skip if symlink already exists and points to correct location
      if [ -L "$target_link" ] && [ "$(readlink "$target_link")" = "$source_dir" ]; then
        echo "  ✓ $relative_path (already linked)"
        continue
      fi

      # Remove existing directory or incorrect symlink
      if [ -e "$target_link" ] || [ -L "$target_link" ]; then
        echo "  🗑️  Removing existing at $relative_path"
        rm -rf "$target_link"
      fi

      # Create parent directory and symlink
      mkdir -p "$(dirname "$target_link")"
      ln -s "$source_dir" "$target_link"
      echo "  ✓ Linked $relative_path"
    done
  done
""",
    """
  if [ -f "{{ repo_path }}/server/config/.env" ]; then
    echo "🔗 Symlinking server/config/.env from main repo"
    mkdir -p "{{ worktree_path }}/server/config"

    # Remove existing .env if it's not a symlink
    if [ -f "{{ worktree_path }}/server/config/.env" ] && [ ! -L "{{ worktree_path }}/server/config/.env" ]; then
      rm "{{ worktree_path }}/server/config/.env"
    fi

    ln -sf "{{ repo_path }}/server/config/.env" "{{ worktree_path }}/server/config/.env"
    echo "  ✓ Environment file linked (direnv will load automatically)"
  fi
""",
    """
  if [ -f "{{ repo_path }}/.envrc" ]; then
    echo "🔗 Symlinking .envrc from main repo"

    # Remove existing .envrc if it's not a symlink
    if [ -f "{{ worktree_path }}/.envrc" ] && [ ! -L "{{ worktree_path }}/.envrc" ]; then
      rm "{{ worktree_path }}/.envrc"
    fi

    ln -sf "{{ repo_path }}/.envrc" "{{ worktree_path }}/.envrc"
    echo "  ✓ Root .envrc linked"
  fi
""",
    """
  echo "🔧 Trusting mise configurations..."
  find "{{ worktree_path }}" -name "mise.toml" -type f | while read -r mise_file; do
    mise_dir="$(dirname "$mise_file")"
    relative_dir="${mise_dir#{{ worktree_path }}/}"
    if [ "$mise_dir" = "{{ worktree_path }}" ]; then
      echo "  ✓ Trusting mise in worktree root"
    else
      echo "  ✓ Trusting mise in $relative_dir"
    fi
    (cd "$mise_dir" && mise trust 2>/dev/null || true)
  done
""",
    """
  # Detect and allow environment management tools
  # Supports: direnv, autoenv (and others can be added easily)

  if command -v direnv >/dev/null 2>&1; then
    echo "✅ Allowing direnv in worktree..."
    (cd "{{ worktree_path }}" && direnv allow 2>/dev/null || true)
    echo "  ✓ Direnv allowed (environment will load automatically)"
  elif command -v autoenv >/dev/null 2>&1; then
    echo "✅ Allowing autoenv in worktree..."
    # Autoenv uses .env files and typically doesn't need explicit allow
    # But we can ensure the .env file exists and is trusted
    if [ -f "{{ worktree_path }}/.env" ]; then
      echo "  ✓ Autoenv will load .env automatically"
    fi
  elif [ -n "${DIRENV_DIR:-}" ]; then
    # direnv is active but binary not in PATH (edge case)
    echo "✅ Direnv detected (via DIRENV_DIR), attempting to allow..."
    (cd "{{ worktree_path }}" && command direnv allow 2>/dev/null || true)
  else
    # No environment management tool detected - this is fine, skip silently
    :
  fi
""",
]
